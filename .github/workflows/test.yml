name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # zarr>=3 (transitive from scitex-io) requires Python 3.11+, so drop
        # 3.10 from the matrix. This package itself has no zarr surface but
        # we standardise the matrix across the ecosystem.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps + test plugins
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e ".[dev]" || pip install -e .
      - name: Detect import name
        id: pkg
        run: |
          IMPORT_NAME=$(find src -maxdepth 2 -name __init__.py -printf '%h\n' | head -1 | xargs -n1 basename)
          echo "import_name=${IMPORT_NAME}" >> "$GITHUB_OUTPUT"
      - name: Run tests with coverage
        run: |
          python -m pytest "$GITHUB_WORKSPACE/tests/" -v --tb=short --timeout=120 \
            --cov=src/${{ steps.pkg.outputs.import_name }} \
            --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  install-check:
    # Catches undeclared runtime deps that the package's own test suite
    # misses. A package can pass its own tests with the wrong pyproject.toml
    # — the bug only shows up when a fresh user runs `pip install <pkg>` in
    # a clean venv. This job reproduces that path. Merged from the legacy
    # install-test.yml workflow.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install in a fresh venv and import
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .
          .venv/bin/python -c "import scitex_web; print(f'OK: {scitex_web.__name__} {scitex_web.__version__}')"
